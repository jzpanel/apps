name: Build & Push PHP Images

on:
  push:
    branches:
      - main
    paths:
      - 'php_55/Dockerfile'
      - 'php_56/Dockerfile'
      - 'php_70/Dockerfile'
      - 'php_74/Dockerfile'
      - 'php_80/Dockerfile'
      - 'php_81/Dockerfile'
      - 'php_82/Dockerfile'
      - 'php_83/Dockerfile'
      - '.github/workflows/build-php.yml'
  # 手动触发（用于首次推送或强制重建）
  workflow_dispatch:
    inputs:
      versions:
        description: '要构建的版本（逗号分隔，如 8.1,8.2 或 all）'
        required: false
        default: 'all'

env:
  REGISTRY: docker.io
  IMAGE_NAME: jzpanel/php

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false   # 某个版本失败不影响其他版本
      matrix:
        include:
          - php_version: "5.5"
            dir: php_55
            tag: "5.5-fpm-alpine"
            platforms: "linux/amd64"
          - php_version: "5.6"
            dir: php_56
            tag: "5.6-fpm-alpine"
            platforms: "linux/amd64"
          - php_version: "7.0"
            dir: php_70
            tag: "7.0-fpm-alpine"
            platforms: "linux/amd64"
          - php_version: "7.4"
            dir: php_74
            tag: "7.4-fpm-alpine"
            platforms: "linux/amd64,linux/arm64"
          - php_version: "8.0"
            dir: php_80
            tag: "8.0-fpm-alpine"
            platforms: "linux/amd64,linux/arm64"
          - php_version: "8.1"
            dir: php_81
            tag: "8.1-fpm-alpine"
            platforms: "linux/amd64,linux/arm64"
          - php_version: "8.2"
            dir: php_82
            tag: "8.2-fpm-alpine"
            platforms: "linux/amd64,linux/arm64"
          - php_version: "8.3"
            dir: php_83
            tag: "8.3-fpm-alpine"
            platforms: "linux/amd64,linux/arm64"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 判断是否需要构建该版本（workflow_dispatch 指定版本时跳过不需要的）
      - name: Check if this version should build
        id: should_build
        run: |
          INPUT="${{ github.event.inputs.versions }}"
          if [ -z "$INPUT" ] || [ "$INPUT" = "all" ]; then
            echo "build=true" >> $GITHUB_OUTPUT
          elif echo "$INPUT" | grep -qw "${{ matrix.php_version }}"; then
            echo "build=true" >> $GITHUB_OUTPUT
          else
            echo "build=false" >> $GITHUB_OUTPUT
            echo "Skipping PHP ${{ matrix.php_version }}"
          fi

      - name: Set up QEMU (multi-arch)
        if: steps.should_build.outputs.build == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.should_build.outputs.build == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: steps.should_build.outputs.build == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push PHP ${{ matrix.php_version }}
        if: steps.should_build.outputs.build == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.dir }}
          file: ./${{ matrix.dir }}/Dockerfile
          platforms: ${{ matrix.platforms }}
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ matrix.tag }}
            ${{ env.IMAGE_NAME }}:${{ matrix.php_version }}
          # 使用 GitHub Actions 缓存加速重复构建
          cache-from: type=gha,scope=php-${{ matrix.php_version }}
          cache-to: type=gha,mode=max,scope=php-${{ matrix.php_version }}

      - name: Image digest
        if: steps.should_build.outputs.build == 'true'
        run: echo "PHP ${{ matrix.php_version }} pushed successfully"
