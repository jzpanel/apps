name: Build & Push PHP Images

on:
  push:
    branches:
      - main
    paths:
      - 'php_54/Dockerfile'
      - 'php_55/Dockerfile'
      - 'php_56/Dockerfile'
      - 'php_70/Dockerfile'
      - 'php_74/Dockerfile'
      - 'php_80/Dockerfile'
      - 'php_81/Dockerfile'
      - 'php_82/Dockerfile'
      - 'php_83/Dockerfile'
      - '.github/workflows/build-php.yml'
  # 手动触发（用于首次推送或强制重建）
  workflow_dispatch:
    inputs:
      versions:
        description: '要构建的版本（逗号分隔，如 8.1,8.2 或 all）'
        required: false
        default: 'all'

env:
  REGISTRY: docker.io
  IMAGE_NAME: jzpanel/php

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false   # 某个版本失败不影响其他版本
      matrix:
        include:
          - php_version: "5.4"
            dir: php_54
            tag: "5.4-fpm"
            platforms: "linux/amd64"
            base_convert: "php:5.4-fpm"
            base_image: "jzpanel/php:5.4-fpm-base"
          - php_version: "5.5"
            dir: php_55
            tag: "5.5-fpm"
            platforms: "linux/amd64"
            base_convert: "php:5.5-fpm"
            base_image: "jzpanel/php:5.5-fpm-base"
          - php_version: "5.6"
            dir: php_56
            tag: "5.6-fpm-alpine"
            platforms: "linux/amd64"
          - php_version: "7.0"
            dir: php_70
            tag: "7.0-fpm-alpine"
            platforms: "linux/amd64"
          - php_version: "7.4"
            dir: php_74
            tag: "7.4-fpm-alpine"
            platforms: "linux/amd64,linux/arm64"
          - php_version: "8.0"
            dir: php_80
            tag: "8.0-fpm-alpine"
            platforms: "linux/amd64,linux/arm64"
          - php_version: "8.1"
            dir: php_81
            tag: "8.1-fpm-alpine"
            platforms: "linux/amd64,linux/arm64"
          - php_version: "8.2"
            dir: php_82
            tag: "8.2-fpm-alpine"
            platforms: "linux/amd64,linux/arm64"
          - php_version: "8.3"
            dir: php_83
            tag: "8.3-fpm-alpine"
            platforms: "linux/amd64,linux/arm64"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 判断是否需要构建该版本（workflow_dispatch 指定版本时跳过不需要的）
      - name: Check if this version should build
        id: should_build
        run: |
          INPUT="${{ github.event.inputs.versions }}"
          if [ -z "$INPUT" ] || [ "$INPUT" = "all" ]; then
            echo "build=true" >> $GITHUB_OUTPUT
          elif echo "$INPUT" | grep -qw "${{ matrix.php_version }}"; then
            echo "build=true" >> $GITHUB_OUTPUT
          else
            echo "build=false" >> $GITHUB_OUTPUT
            echo "Skipping PHP ${{ matrix.php_version }}"
          fi

      - name: Set up QEMU (multi-arch)
        if: steps.should_build.outputs.build == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.should_build.outputs.build == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: steps.should_build.outputs.build == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 老版本（如 PHP 5.4）官方镜像是已废弃的 Docker schema 1 manifest，
      # BuildKit 拒绝以它为 FROM 基底。用 skopeo 无损转换为 schema 2 并推到我们自己的
      # 命名空间（jzpanel/php:<ver>-fpm-base），Dockerfile 再 FROM 这个转好的基底。
      # 仅当 matrix.base_convert 非空时执行（目前只有 5.4 需要）。
      - name: Convert legacy schema1 base image to schema2 (skopeo)
        if: steps.should_build.outputs.build == 'true' && matrix.base_convert != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y skopeo
          skopeo copy --format v2s2 --all=false \
            --dest-creds "${{ secrets.DOCKERHUB_USERNAME }}:${{ secrets.DOCKERHUB_TOKEN }}" \
            docker://${{ matrix.base_convert }} \
            docker://${{ matrix.base_image }}
          echo "已转换 ${{ matrix.base_convert }} → ${{ matrix.base_image }}（schema2）"

      - name: Build and push PHP ${{ matrix.php_version }} (buildx, multi-arch / list-manifest bases)
        if: steps.should_build.outputs.build == 'true' && matrix.base_convert == ''
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.dir }}
          file: ./${{ matrix.dir }}/Dockerfile
          platforms: ${{ matrix.platforms }}
          push: true
          no-cache: true
          pull: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ matrix.tag }}
            ${{ env.IMAGE_NAME }}:${{ matrix.php_version }}

      # 老版本（5.4/5.5）的基底经 skopeo 转成单架构 schema2，buildx/buildkit 解析其
      # content-addressable digest 时会报 "content digest : not found"（buildkit 对单 manifest
      # 镜像的已知问题）。这些版本改用经典 builder（DOCKER_BUILDKIT=0 docker build），
      # 经典 builder 用传统镜像拉取逻辑，不走 buildkit content store，可正常 FROM 这类镜像。
      # 经典 builder 只支持单架构，正好这些老版本仅 linux/amd64。
      - name: Build and push PHP ${{ matrix.php_version }} (legacy builder, converted bases)
        if: steps.should_build.outputs.build == 'true' && matrix.base_convert != ''
        env:
          DOCKER_BUILDKIT: "0"
        run: |
          docker build --pull --no-cache \
            -t "${{ env.IMAGE_NAME }}:${{ matrix.tag }}" \
            -t "${{ env.IMAGE_NAME }}:${{ matrix.php_version }}" \
            -f "./${{ matrix.dir }}/Dockerfile" \
            "./${{ matrix.dir }}"
          docker push "${{ env.IMAGE_NAME }}:${{ matrix.tag }}"
          docker push "${{ env.IMAGE_NAME }}:${{ matrix.php_version }}"

      - name: Image digest
        if: steps.should_build.outputs.build == 'true'
        run: echo "PHP ${{ matrix.php_version }} pushed successfully"
