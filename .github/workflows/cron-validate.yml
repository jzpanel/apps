name: Daily Strict Validation

on:
  schedule:
    # 每天 UTC 02:00（北京时间 10:00）跑一次严格校验
    # 用于捕获上游主动删除 tag 的罕见场景
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  validate-strict:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: scripts/go.sum

      - name: Run strict validation
        id: validate
        working-directory: scripts
        continue-on-error: true
        run: go run check-versions.go --apps-dir .. --strict

      - name: Open issue on failure
        if: steps.validate.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().slice(0, 10);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `每日严格校验发现镜像 tag 不可用。详见 [Run #${context.runId}](${runUrl})。`,
              '',
              '可能的原因：',
              '- 上游主动删除了某个 tag（罕见但偶尔发生）',
              '- Docker Hub 限流（建议先重跑一次 workflow）',
              '- 内置加速地址异常',
              '',
              '请立刻 review 并修复对应 yaml。',
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[strict-validation] ${today} 镜像版本校验失败`,
              body,
              labels: ['validation', 'urgent'],
            });

      - name: Re-fail if validation failed
        if: steps.validate.outcome == 'failure'
        run: exit 1
