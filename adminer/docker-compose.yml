services:
  adminer:
    image: adminer:{{tag}}
    container_name: panel_adminer
    restart: unless-stopped
    ports:
      - "{{port}}:8080"
    networks:
      - panel_network
    deploy:
      resources:
        limits:
          memory: {{mem_limit}}
          cpus: "{{cpu_limit}}"
        reservations:
          memory: {{mem_reserve}}

networks:
  panel_network:
    external: true
    name: panel_network
