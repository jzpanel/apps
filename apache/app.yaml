key: apache
name: Apache
category: runtime
description: 世界上使用最广泛的 Web 服务器，支持 .htaccess 动态配置
source: official
sort_weight: 900
icon: icon.svg
versions:
  - display: "2.4"
    tag: "2.4-alpine"
    image: httpd
    architectures: [amd64, arm64]
    is_default: true
default_version: "2.4"
architectures: [amd64, arm64]
service_type: webserver
has_web_ui: false
health_check_timeout: 30

params:
  - key: http_port
    label: HTTP 端口
    type: number
    default: 80
    required: true
    expose: public
  - key: https_port
    label: HTTPS 端口
    type: number
    default: 443
    required: true
    expose: public

manage:
  - key: ServerTokens
    label: 隐藏版本信息
    type: select
    description: 控制响应头中服务器信息的详细程度
    options:
      - value: Prod
        label: Prod（仅显示 Apache，推荐）
      - value: Major
        label: Major（显示主版本号）
      - value: Full
        label: Full（显示完整版本）
    restart_required: false
    file_path: /www/server/apache/httpd.conf
    ini_section: ""
    format: kv_space

  - key: ServerSignature
    label: 错误页面签名
    type: select
    description: 错误页面底部是否显示服务器信息
    options:
      - value: "Off"
        label: 关闭（推荐）
      - value: "On"
        label: 开启
    restart_required: false
    file_path: /www/server/apache/httpd.conf
    ini_section: ""
    format: kv_space

  - key: KeepAlive
    label: 长连接
    type: switch
    description: 开启后允许单个连接处理多个请求
    bool_format: "On/Off"
    restart_required: false
    file_path: /www/server/apache/httpd.conf
    ini_section: ""
    format: kv_space

  - key: KeepAliveTimeout
    label: 长连接超时（秒）
    type: number
    description: 长连接等待下一个请求的超时时间
    restart_required: false
    file_path: /www/server/apache/httpd.conf
    ini_section: ""
    format: kv_space

  - key: LimitRequestBody
    label: 最大请求体大小（字节）
    type: number
    description: 0 表示不限制，100MB = 104857600
    restart_required: false
    file_path: /www/server/apache/httpd.conf
    ini_section: ""
    format: kv_space

  - key: LogLevel
    label: 日志级别
    type: select
    description: 错误日志的详细程度
    options:
      - value: warn
        label: warn（推荐）
      - value: error
        label: error（仅错误）
      - value: info
        label: info（详细）
      - value: debug
        label: debug（调试）
    restart_required: false
    file_path: /www/server/apache/httpd.conf
    ini_section: ""
    format: kv_space

init_files:
  - path: /www/server/apache/httpd.conf
    file: init/httpd.conf

install_hints:
  - "网站管理 → 可以创建和管理网站"
  - "SSL 证书 → 为网站配置 HTTPS"
  - "管理 → 配置项 可调整性能和安全参数"

install_guide:
  description: "已自动注册为 Web 服务器，现在可以开始创建网站："
  features:
    - "网站管理 - 创建静态/PHP 网站"
    - "SSL 证书 - 配置 HTTPS"
    - ".htaccess - 支持目录级配置"
  primary_action:
    label: "创建第一个网站"
    route: "/website"

resource_limits:
  memory_mb: 256
  cpus: 1.0
  mem_reserve_mb: 64

tabs:
  - id: performance
    label: 性能
    type: performance
