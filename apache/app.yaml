key: apache
name: Apache
category: runtime
description: 世界上使用最广泛的 Web 服务器，支持 .htaccess 动态配置
source: official
icon: icon.svg
versions:
  - "2.4"
default_version: "2.4"
service_type: webserver
has_web_ui: false
health_check_timeout: 30

params:
  - key: http_port
    label: HTTP 端口
    type: number
    default: 80
    required: true
  - key: https_port
    label: HTTPS 端口
    type: number
    default: 443
    required: true

manage:
  - key: ServerTokens
    label: 隐藏版本信息
    type: select
    description: 控制响应头中服务器信息的详细程度
    options:
      - value: Prod
        label: Prod（仅显示 Apache，推荐）
      - value: Major
        label: Major（显示主版本号）
      - value: Full
        label: Full（显示完整版本）
    restart_required: false
    file_path: /www/server/apache/httpd.conf
    ini_section: global

  - key: ServerSignature
    label: 错误页面签名
    type: select
    description: 错误页面底部是否显示服务器信息
    options:
      - value: "Off"
        label: 关闭（推荐）
      - value: "On"
        label: 开启
    restart_required: false
    file_path: /www/server/apache/httpd.conf
    ini_section: global

  - key: MaxRequestWorkers
    label: 最大并发请求数
    type: number
    description: 同时处理的最大请求数，根据内存调整
    restart_required: true
    file_path: /www/server/apache/httpd.conf
    ini_section: mpm

  - key: KeepAlive
    label: 长连接
    type: switch
    description: 开启后允许单个连接处理多个请求
    restart_required: false
    file_path: /www/server/apache/httpd.conf
    ini_section: global

  - key: KeepAliveTimeout
    label: 长连接超时（秒）
    type: number
    description: 长连接等待下一个请求的超时时间
    restart_required: false
    file_path: /www/server/apache/httpd.conf
    ini_section: global

  - key: LimitRequestBody
    label: 最大请求体大小（字节）
    type: number
    description: 0 表示不限制，100MB = 104857600
    restart_required: false
    file_path: /www/server/apache/httpd.conf
    ini_section: global

  - key: LogLevel
    label: 日志级别
    type: select
    description: 错误日志的详细程度
    options:
      - value: warn
        label: warn（推荐）
      - value: error
        label: error（仅错误）
      - value: info
        label: info（详细）
      - value: debug
        label: debug（调试）
    restart_required: false
    file_path: /www/server/apache/httpd.conf
    ini_section: global

actions:
  - id: reload
    label: 重载配置
    icon: refresh
    confirm: false
    danger: false
    exec: "apachectl graceful"

  - id: test_config
    label: 测试配置
    icon: check
    confirm: false
    danger: false
    exec: "apachectl configtest 2>&1"

  - id: enable_rewrite
    label: 启用 Rewrite 模块
    icon: code
    confirm: true
    danger: false
    exec: "a2enmod rewrite && apachectl graceful"

  - id: enable_ssl
    label: 启用 SSL 模块
    icon: lock
    confirm: true
    danger: false
    exec: "a2enmod ssl && apachectl graceful"

init_files:
  - path: /www/server/apache/httpd.conf
    file: init/httpd.conf

install_hints:
  - "网站管理 → 可以创建和管理网站"
  - "SSL 证书 → 为网站配置 HTTPS"
  - "管理 → 配置项 可调整性能和安全参数"

install_guide:
  description: "已自动注册为 Web 服务器，现在可以开始创建网站："
  features:
    - "网站管理 - 创建静态/PHP 网站"
    - "SSL 证书 - 配置 HTTPS"
    - ".htaccess - 支持目录级配置"
  primary_action:
    label: "创建第一个网站"
    route: "/website"
