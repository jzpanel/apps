key: cloudreve
name: Cloudreve
category: utility
description: 国产开源自托管网盘，支持本地存储、对象存储（MinIO/S3/OSS）、文件分享、多用户管理
source: official
icon: icon.png
versions:
  - display: "4.16"
    tag: "4.16.1"
    image: cloudreve/cloudreve
    architectures: [amd64, arm64]
    is_default: true
  - display: "4.15"
    tag: "4.15.0"
    image: cloudreve/cloudreve
    architectures: [amd64, arm64]
default_version: "4.16"
architectures: [amd64, arm64]
has_web_ui: true
health_check_timeout: 60

params:
  - key: port
    label: 访问端口
    type: number
    default: 5212
    required: true

# Cloudreve 容器以 root 运行，数据目录 0755 即可
volumes_init:
  - path: /www/server/cloudreve/data
    mode: "0755"

manage: []

install_hints:
  - "通过浏览器访问 http://服务器IP:端口 进入网盘界面"
  - "首次访问需注册账号，第一个注册的账号自动成为管理员"
  - "默认使用内置 SQLite 存储，开箱即用，数据保存在 /www/server/cloudreve/data"
  - "如需对接 MinIO / 对象存储，在管理后台「存储策略」中配置"

resource_limits:
  memory_mb: 1024
  cpus: 1.0
  mem_reserve_mb: 256

tabs:
  - id: performance
    label: 性能
    type: performance

proxy_spec:
  port_param: port
  ws_support: true
  description: "通过域名访问 Cloudreve，建议配置 HTTPS 保护网盘"

# Web 访问控制：Cloudreve 自带账号登录（首个注册账号为管理员），可开启外部访问
web_access:
  auth: builtin
  console_port_param: port

install_guide:
  description: "Cloudreve 已安装，可以通过浏览器搭建私有网盘："
  features:
    - "文件管理 - 上传、下载、预览、分享文件"
    - "多存储后端 - 本地存储或对接 MinIO/S3/OSS 对象存储"
    - "多用户 - 用户组、配额、权限管理"
  primary_action:
    label: "打开 Cloudreve"
    route: "/apps"
