services:
  java:
    image: jzpanel/java:{{tag}}
    container_name: panel_java_21
    restart: unless-stopped
    network_mode: host
    volumes:
      - /www/wwwroot:/www/wwwroot
      - /www/server/java_21/supervisor:/etc/supervisor/conf.d
      - /www/logs/java_21:/var/log/supervisor
      - /www/wwwlogs:/www/wwwlogs
    deploy:
      resources:
        limits:
          memory: {{mem_limit}}
          cpus: "{{cpu_limit}}"
        reservations:
          memory: {{mem_reserve}}
