services:
  minio:
    image: minio/minio:{{tag}}
    container_name: panel_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: "{{root_user}}"
      MINIO_ROOT_PASSWORD: "{{root_password}}"
    ports:
      - "{{api_port}}:9000"
      - "{{console_port}}:9001"
    volumes:
      - /www/server/minio/data:/data
    networks:
      - panel_network
    deploy:
      resources:
        limits:
          memory: {{mem_limit}}
          cpus: "{{cpu_limit}}"
        reservations:
          memory: {{mem_reserve}}

networks:
  panel_network:
    external: true
    name: panel_network
