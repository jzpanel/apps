services:
  mongoexpress:
    image: mongo-express:{{tag}}
    container_name: panel_mongoexpress
    restart: unless-stopped
    ports:
      - "{{port}}:8081"
    environment:
      ME_CONFIG_MONGODB_URL: "{{me_mongodb_url}}"
      ME_CONFIG_MONGODB_ENABLE_ADMIN: "true"
    networks:
      - panel_network
    deploy:
      resources:
        limits:
          memory: {{mem_limit}}
          cpus: "{{cpu_limit}}"
        reservations:
          memory: {{mem_reserve}}

networks:
  panel_network:
    external: true
    name: panel_network
