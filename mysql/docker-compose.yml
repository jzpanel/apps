services:
  mysql:
    image: mysql:{{version}}
    container_name: panel_mysql
    restart: unless-stopped
    ports:
      - "{{port}}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "{{root_password}}"
      MYSQL_ROOT_HOST: "%"
    volumes:
      - /www/server/mysql/data:/var/lib/mysql
      - /www/server/mysql/my.cnf:/etc/mysql/conf.d/custom.cnf:ro
      - /www/logs/mysql:/var/log/mysql
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - panel_network

networks:
  panel_network:
    external: true
    name: panel_network
