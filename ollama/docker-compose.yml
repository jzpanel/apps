services:
  ollama:
    image: ollama/ollama:{{tag}}
    container_name: panel_ollama
    restart: unless-stopped
    ports:
      - "{{port}}:11434"
    volumes:
      - /www/server/ollama/data:/root/.ollama
    networks:
      - panel_network
    deploy:
      resources:
        limits:
          memory: {{mem_limit}}
          cpus: "{{cpu_limit}}"
        reservations:
          memory: {{mem_reserve}}

networks:
  panel_network:
    external: true
    name: panel_network
