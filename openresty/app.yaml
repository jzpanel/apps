key: openresty
name: OpenResty
category: runtime
description: 基于 Nginx 的高性能 Web 平台，内置 LuaJIT，支持动态 Web 应用开发
source: official
icon: icon.svg
versions:
  - "1.25"
  - "1.21"
default_version: "1.25"
service_type: webserver
has_web_ui: false
health_check_timeout: 30

params:
  - key: http_port
    label: HTTP 端口
    type: number
    default: 80
    required: true
  - key: https_port
    label: HTTPS 端口
    type: number
    default: 443
    required: true

manage:
  - key: worker_processes
    label: Worker 进程数
    type: select
    description: auto 表示自动检测 CPU 核心数
    options:
      - value: auto
        label: 自动（推荐）
      - value: "1"
        label: "1"
      - value: "2"
        label: "2"
      - value: "4"
        label: "4"
      - value: "8"
        label: "8"
    restart_required: true
    file_path: /www/server/openresty/nginx.conf
    ini_section: main

  - key: worker_connections
    label: 每进程最大连接数
    type: select
    options:
      - value: "1024"
        label: "1024"
      - value: "2048"
        label: "2048"
      - value: "4096"
        label: "4096（推荐）"
      - value: "8192"
        label: "8192"
      - value: "65535"
        label: "65535（高并发）"
    restart_required: true
    file_path: /www/server/openresty/nginx.conf
    ini_section: events

  - key: lua_code_cache
    label: Lua 代码缓存
    type: switch
    description: 生产环境开启，开发调试时关闭（关闭后每次请求重新加载 Lua 文件）
    restart_required: false
    file_path: /www/server/openresty/nginx.conf
    ini_section: http

  - key: keepalive_timeout
    label: Keepalive 超时（秒）
    type: number
    restart_required: false
    file_path: /www/server/openresty/nginx.conf
    ini_section: http

  - key: client_max_body_size
    label: 最大请求体大小
    type: text
    description: 如 10m、100m、0（不限制）
    restart_required: false
    file_path: /www/server/openresty/nginx.conf
    ini_section: http

  - key: gzip
    label: Gzip 压缩
    type: switch
    restart_required: false
    file_path: /www/server/openresty/nginx.conf
    ini_section: http

  - key: gzip_comp_level
    label: Gzip 压缩级别
    type: select
    options:
      - value: "1"
        label: "1（最快）"
      - value: "6"
        label: "6（推荐）"
      - value: "9"
        label: "9（最高压缩）"
    restart_required: false
    file_path: /www/server/openresty/nginx.conf
    ini_section: http

  - key: server_tokens
    label: 隐藏版本号
    type: switch
    restart_required: false
    file_path: /www/server/openresty/nginx.conf
    ini_section: http

  - key: lua_shared_dict_size
    label: Lua 共享内存大小
    type: text
    description: Lua 共享字典内存，如 10m、64m，用于缓存和限流
    restart_required: true
    file_path: /www/server/openresty/nginx.conf
    ini_section: http

actions:
  - id: reload
    label: 重载配置
    icon: refresh
    confirm: false
    danger: false
    exec: "openresty -s reload"

  - id: test_config
    label: 测试配置
    icon: check
    confirm: false
    danger: false
    exec: "openresty -t 2>&1"

  - id: reopen_logs
    label: 重开日志
    icon: file
    confirm: false
    danger: false
    exec: "openresty -s reopen"

init_files:
  - path: /www/server/openresty/nginx.conf
    file: init/nginx.conf

install_hints:
  - "网站管理 → 可以创建和管理网站"
  - "支持 Lua 脚本实现 WAF、限流、动态路由等高级功能"

install_guide:
  description: "已自动注册为 Web 服务器，支持 Lua 扩展的高性能平台："
  features:
    - "网站管理 - 创建和管理网站"
    - "Lua 扩展 - 支持 WAF、限流、动态路由"
    - "高性能 - 基于 Nginx，支持高并发"
  primary_action:
    label: "创建第一个网站"
    route: "/website"
