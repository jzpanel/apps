user  nobody;
worker_processes  auto;

# 日志路径与 docker-compose.yml 的 /www/logs/openresty:/usr/local/openresty/nginx/logs 挂载点对齐
error_log  /usr/local/openresty/nginx/logs/error.log warn;
pid        /usr/local/openresty/nginx/logs/openresty.pid;

events {
    worker_connections  4096;
    use epoll;
    multi_accept on;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /usr/local/openresty/nginx/logs/access.log  main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;

    keepalive_timeout  65;
    client_max_body_size 64m;

    gzip  on;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    server_tokens off;

    lua_code_cache on;

    # 容器内路径，与 compose 挂载点一致：
    #   /www/server/openresty/conf.d  -> /etc/nginx/conf.d
    #   /www/server/openresty/conf/vhost -> /etc/nginx/conf/vhost
    include /etc/nginx/conf.d/*.conf;
    include /etc/nginx/conf/vhost/*.conf;
}
