key: pgweb
name: pgweb
category: tools
description: PostgreSQL 的轻量级 Web 客户端，支持 SQL 执行、数据浏览、导出
source: official
sort_weight: 610
icon: icon.svg
versions:
  - display: "0.15"
    tag: "0.15.0"
    image: sosedoff/pgweb
    architectures: [amd64, arm64]
    is_default: true
  - display: "0.14"
    tag: "0.14.3"
    image: sosedoff/pgweb
    architectures: [amd64, arm64]
    deprecated: true
default_version: "0.15"
architectures: [amd64, arm64]
has_web_ui: true
health_check_timeout: 30
dependencies:
  - postgresql

params:
  - key: port
    label: 访问端口
    type: number
    default: 8082
    required: true

compose_vars:
  - placeholder: "{{pgweb_db_url}}"
    source: registry_password
    registry_type: postgresql
    template: "postgres://{{username}}:{{password}}@panel_postgresql:5432/postgres?sslmode=disable"
    empty_value: "postgres://postgres@panel_postgresql:5432/postgres?sslmode=disable"

manage:
  - key: PGWEB_AUTH_USER
    label: Web 界面用户名（可选）
    type: text
    description: 设置后需要登录才能访问，留空则无需登录（不建议公网暴露）
    restart_required: true
    file_path: /www/server/pgweb/.env
    ini_section: ""
    format: env

  - key: PGWEB_AUTH_PASS
    label: Web 界面密码
    type: password
    description: 配合用户名使用
    restart_required: true
    file_path: /www/server/pgweb/.env
    ini_section: ""
    format: env

install_hints:
  - "通过浏览器访问 http://服务器IP:端口 进入管理界面"
  - "建议通过反向代理并配置 HTTPS 后再公网访问"

resource_limits:
  memory_mb: 128
  cpus: 0.5
  mem_reserve_mb: 64

tabs:
  - id: performance
    label: 性能
    type: performance

proxy_spec:
  port_param: port
  ws_support: false
  description: "通过域名访问 pgweb，建议配置 HTTPS 保护数据库管理界面"

# Web 访问控制：pgweb 默认无登录认证，强制只能面板代理访问
web_access:
  auth: none
  console_port_param: port

install_guide:
  description: "pgweb 已安装，可以通过浏览器管理 PostgreSQL："
  features:
    - "SQL 执行 - 直接执行 SQL 语句"
    - "数据浏览 - 查看表结构和数据"
    - "数据导出 - 导出查询结果为 CSV"
  primary_action:
    label: "打开 pgweb"
    route: "/apps"
