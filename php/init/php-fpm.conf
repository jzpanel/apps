[www]
user = www-data
group = www-data

; 监听
listen = 0.0.0.0:9000

; 进程管理
pm = dynamic
pm.max_children = 50
pm.start_servers = 5
pm.min_spare_servers = 5
pm.max_spare_servers = 35
pm.max_requests = 500

; 超时
request_terminate_timeout = 300

; 日志
access.log = /var/log/php-fpm/access.log
slowlog = /var/log/php-fpm/slow.log
request_slowlog_timeout = 10s

; 状态页（供监控使用）
pm.status_path = /php-fpm-status
