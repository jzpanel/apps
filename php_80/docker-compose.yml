services:
  php:
    image: php:{{tag}}
    container_name: panel_php_80
    restart: unless-stopped
    ports:
      - "{{fpm_port}}:9000"
    volumes:
      - /www/wwwroot:/www/wwwroot
      - /www/server/php_80/php.ini:/usr/local/etc/php/php.ini:ro
      - /www/server/php_80/php-fpm.conf:/usr/local/etc/php-fpm.d/www.conf:ro
      - /www/logs/php_80:/var/log/php-fpm
    networks:
      - panel_network
    deploy:
      resources:
        limits:
          memory: {{mem_limit}}
          cpus: "{{cpu_limit}}"
        reservations:
          memory: {{mem_reserve}}

networks:
  panel_network:
    external: true
    name: panel_network