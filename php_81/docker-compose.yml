services:
  php:
    image: php:8.1-fpm-alpine
    container_name: panel_php_81
    restart: unless-stopped
    ports:
      - "{{fpm_port}}:9000"
    volumes:
      - /www/wwwroot:/www/wwwroot
      - /www/server/php_81/php.ini:/usr/local/etc/php/php.ini:ro
      - /www/server/php_81/php-fpm.conf:/usr/local/etc/php-fpm.d/www.conf:ro
      - /www/logs/php_81:/var/log/php-fpm
    networks:
      - panel_network

networks:
  panel_network:
    external: true
    name: panel_network