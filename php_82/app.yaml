key: php_82
name: PHP 8.2
category: runtime
description: PHP 8.2 FPM 运行环境，配合 Nginx/Apache 运行 PHP 网站
source: official
icon: icon.svg
versions:
  - "8.2"
default_version: "8.2"
service_type: php
has_web_ui: false
health_check_timeout: 30

params:
  - key: fpm_port
    label: FPM 监听端口
    type: number
    default: 9082
    required: true

manage:
  - key: memory_limit
    label: 内存限制
    type: select
    description: 每个 PHP 进程可使用的最大内存
    options:
      - value: 64M
        label: 64M
      - value: 128M
        label: 128M（默认）
      - value: 256M
        label: 256M（推荐）
      - value: 512M
        label: 512M
      - value: 1024M
        label: 1024M
      - value: -1
        label: 不限制
    restart_required: true
    file_path: /www/server/php_82/php.ini
    ini_section: PHP

  - key: upload_max_filesize
    label: 最大上传文件大小
    type: select
    options:
      - value: 2M
        label: 2M
      - value: 10M
        label: 10M
      - value: 32M
        label: 32M
      - value: 64M
        label: 64M（推荐）
      - value: 128M
        label: 128M
      - value: 256M
        label: 256M
    restart_required: true
    file_path: /www/server/php_82/php.ini
    ini_section: PHP

  - key: post_max_size
    label: POST 数据最大大小
    type: select
    options:
      - value: 8M
        label: 8M
      - value: 32M
        label: 32M
      - value: 64M
        label: 64M
      - value: 128M
        label: 128M（推荐）
      - value: 256M
        label: 256M
    restart_required: true
    file_path: /www/server/php_82/php.ini
    ini_section: PHP

  - key: max_execution_time
    label: 最大执行时间（秒）
    type: number
    description: PHP 脚本最大执行时间，0 表示不限制
    restart_required: true
    file_path: /www/server/php_82/php.ini
    ini_section: PHP

  - key: max_input_vars
    label: 最大输入变量数
    type: number
    restart_required: true
    file_path: /www/server/php_82/php.ini
    ini_section: PHP

  - key: date.timezone
    label: 时区
    type: select
    options:
      - value: Asia/Shanghai
        label: Asia/Shanghai（推荐）
      - value: Asia/Hong_Kong
        label: Asia/Hong_Kong
      - value: UTC
        label: UTC
    restart_required: true
    file_path: /www/server/php_82/php.ini
    ini_section: PHP

  - key: display_errors
    label: 显示错误信息
    type: switch
    description: 生产环境建议关闭
    restart_required: true
    file_path: /www/server/php_82/php.ini
    ini_section: PHP

  - key: disable_functions
    label: 禁用函数
    type: text
    description: "逗号分隔，如: exec,passthru,shell_exec，留空不禁用"
    restart_required: true
    file_path: /www/server/php_82/php.ini
    ini_section: PHP

  - key: opcache.enable
    label: 启用 OPcache
    type: switch
    description: 字节码缓存，强烈推荐开启
    restart_required: true
    file_path: /www/server/php_82/php.ini
    ini_section: opcache

  - key: opcache.memory_consumption
    label: OPcache 内存大小（MB）
    type: select
    options:
      - value: "64"
        label: 64MB
      - value: "128"
        label: 128MB（推荐）
      - value: "256"
        label: 256MB
    restart_required: true
    file_path: /www/server/php_82/php.ini
    ini_section: opcache

  - key: pm
    label: 进程管理方式
    type: select
    options:
      - value: dynamic
        label: dynamic（动态，推荐）
      - value: static
        label: static（固定）
      - value: ondemand
        label: ondemand（按需）
    restart_required: true
    file_path: /www/server/php_82/php-fpm.conf
    ini_section: www

  - key: pm.max_children
    label: 最大子进程数
    type: number
    description: 根据内存调整，每进程约 30-50MB
    restart_required: true
    file_path: /www/server/php_82/php-fpm.conf
    ini_section: www

  - key: pm.max_requests
    label: 每进程最大请求数
    type: number
    description: 防止内存泄漏，0=不限制
    restart_required: true
    file_path: /www/server/php_82/php-fpm.conf
    ini_section: www

actions:
  - id: reload
    label: 重载配置
    icon: refresh
    confirm: false
    danger: false
    exec: "kill -USR2 1"

  - id: phpinfo
    label: 查看 PHP 信息
    icon: info
    confirm: false
    danger: false
    exec: "php -i | head -50"

php_extensions:
  - name: mysqli
    label: MySQLi
    install_command: "docker-php-ext-install mysqli && docker-php-ext-enable mysqli"
  - name: pdo_mysql
    label: PDO MySQL
    install_command: "docker-php-ext-install pdo_mysql && docker-php-ext-enable pdo_mysql"
  - name: pdo_pgsql
    label: PDO PostgreSQL
    install_command: "apt-get update -qq && apt-get install -y -qq libpq-dev && docker-php-ext-install pdo_pgsql"
  - name: redis
    label: Redis
    install_command: "pecl install redis && docker-php-ext-enable redis"
  - name: memcached
    label: Memcached
    install_command: "apt-get update -qq && apt-get install -y -qq libmemcached-dev && pecl install memcached && docker-php-ext-enable memcached"
  - name: mongodb
    label: MongoDB
    install_command: "pecl install mongodb && docker-php-ext-enable mongodb"
  - name: gd
    label: GD 图像处理
    install_command: "apt-get update -qq && apt-get install -y -qq libfreetype6-dev libjpeg62-turbo-dev libpng-dev libwebp-dev && docker-php-ext-configure gd --with-freetype --with-jpeg --with-webp && docker-php-ext-install gd"
  - name: imagick
    label: ImageMagick
    install_command: "apt-get update -qq && apt-get install -y -qq libmagickwand-dev && pecl install imagick && docker-php-ext-enable imagick"
  - name: exif
    label: EXIF 图片元数据
    install_command: "docker-php-ext-install exif && docker-php-ext-enable exif"
  - name: mbstring
    label: 多字节字符串
    install_command: "docker-php-ext-install mbstring"
  - name: intl
    label: 国际化（intl）
    install_command: "apt-get update -qq && apt-get install -y -qq libicu-dev && docker-php-ext-install intl"
  - name: curl
    label: cURL
    install_command: "apt-get update -qq && apt-get install -y -qq libcurl4-openssl-dev && docker-php-ext-install curl"
  - name: soap
    label: SOAP
    install_command: "apt-get update -qq && apt-get install -y -qq libxml2-dev && docker-php-ext-install soap"
  - name: sockets
    label: Sockets
    install_command: "docker-php-ext-install sockets"
  - name: zip
    label: ZIP 压缩
    install_command: "apt-get update -qq && apt-get install -y -qq libzip-dev && docker-php-ext-install zip"
  - name: fileinfo
    label: 文件信息检测
    install_command: "docker-php-ext-install fileinfo"
  - name: sodium
    label: Sodium 加密
    install_command: "docker-php-ext-install sodium"
  - name: opcache
    label: OPcache
    install_command: "docker-php-ext-install opcache && docker-php-ext-enable opcache"
  - name: apcu
    label: APCu 用户态缓存
    install_command: "pecl install apcu && docker-php-ext-enable apcu"
  - name: ioncube
    label: ionCube Loader（运行加密源码）
    install_command: "PHP_VER=$(php -r 'echo PHP_MAJOR_VERSION.\".\".PHP_MINOR_VERSION;') && curl -fsSL https://downloads.ioncube.com/loader_downloads/ioncube_loaders_lin_x86-64.tar.gz -o /tmp/ioncube.tar.gz && tar -xzf /tmp/ioncube.tar.gz -C /tmp && cp /tmp/ioncube/ioncube_loader_lin_${PHP_VER}.so $(php-config --extension-dir)/ && echo \"zend_extension=ioncube_loader_lin_${PHP_VER}.so\" > /usr/local/etc/php/conf.d/00-ioncube.ini && rm -rf /tmp/ioncube /tmp/ioncube.tar.gz"
  - name: swoole
    label: Swoole 协程框架
    install_command: "pecl install swoole && docker-php-ext-enable swoole"
  - name: xdebug
    label: Xdebug 调试器
    install_command: "pecl install xdebug && docker-php-ext-enable xdebug"
  - name: bcmath
    label: BCMath 高精度数学
    install_command: "docker-php-ext-install bcmath"
  - name: pcntl
    label: 进程控制
    install_command: "docker-php-ext-install pcntl"

init_files:
  - path: /www/server/php_82/php.ini
    file: init/php.ini
  - path: /www/server/php_82/php-fpm.conf
    file: init/php-fpm.conf

install_hints:
  - "PHP 8.2 已安装，可在网站管理中选择此版本"
  - "在扩展管理中安装所需扩展（mysqli、redis 等）"
