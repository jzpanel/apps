services:
  phpmyadmin:
    image: phpmyadmin:{{tag}}
    container_name: panel_phpmyadmin
    restart: unless-stopped
    ports:
      - "{{port}}:80"
    environment:
      PMA_HOSTS: "{{pma_hosts}}"
      PMA_PORT: 3306
      # 锁定服务器地址：只允许连接面板注册的数据库容器（PMA_HOSTS），
      # 登录页不显示"服务器"输入框，用户只填账号密码，避免填错地址（如 127.0.0.1 连不上）。
      PMA_ARBITRARY: 0
      UPLOAD_LIMIT: 256M
    volumes:
      - /www/server/phpmyadmin/config.user.inc.php:/etc/phpmyadmin/config.user.inc.php
    networks:
      - panel_network
    deploy:
      resources:
        limits:
          memory: {{mem_limit}}
          cpus: "{{cpu_limit}}"
        reservations:
          memory: {{mem_reserve}}

networks:
  panel_network:
    external: true
    name: panel_network
