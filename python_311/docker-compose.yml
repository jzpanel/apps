services:
  python:
    image: jzpanel/python:{{tag}}
    container_name: panel_python_311
    restart: unless-stopped
    network_mode: host
    volumes:
      - /www/wwwroot:/www/wwwroot
      - /www/server/python_311/supervisor:/etc/supervisor/conf.d
      - /www/logs/python_311:/var/log/supervisor
      - /www/wwwlogs:/www/wwwlogs
    deploy:
      resources:
        limits:
          memory: {{mem_limit}}
          cpus: "{{cpu_limit}}"
        reservations:
          memory: {{mem_reserve}}
