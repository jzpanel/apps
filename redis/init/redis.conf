# Redis 配置文件 - 由面板管理

# 网络
bind 0.0.0.0
port 6379
tcp-keepalive 300
maxclients 10000

# 内存
maxmemory 0
maxmemory-policy noeviction

# 持久化 - RDB
save 3600 1 300 100 60 10000
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# 持久化 - AOF
appendonly no
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no

# 慢日志
slowlog-log-slower-than 10000
slowlog-max-len 128

# 日志
loglevel notice
logfile /var/log/redis/redis.log
