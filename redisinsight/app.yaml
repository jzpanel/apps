key: redisinsight
name: RedisInsight
category: tools
description: Redis 官方 Web 管理工具，支持键值浏览、命令执行、性能监控、慢日志分析
source: official
sort_weight: 600
icon: icon.svg
versions:
  - display: "3.4"
    tag: "3.4"
    image: redis/redisinsight
    architectures: [amd64, arm64]
    is_default: true
default_version: "3.4"
architectures: [amd64, arm64]
has_web_ui: true
health_check_timeout: 30
dependencies:
  - redis

params:
  - key: port
    label: 访问端口
    type: number
    default: 8085
    required: true

# 预配置连接：从服务注册表读取 Redis 密码注入 RI_REDIS_PASSWORD
# 用 registry_password_raw（不 URL 编码，因为这是普通环境变量不是 URL）
# Redis 未设密码时为空字符串（RedisInsight 走无密码连接）
compose_vars:
  - placeholder: "{{ri_redis_password}}"
    source: registry_password_raw
    registry_type: redis
    template: "{{password}}"
    empty_value: ""

# RedisInsight 容器以 UID 1000 运行，预创建并 chown 数据目录
volumes_init:
  - path: /www/server/redisinsight/data
    uid: 1000
    gid: 1000
    mode: "0755"

manage: []

install_hints:
  - "通过浏览器访问 http://服务器IP:端口 进入管理界面"
  - "已自动预配置面板 Redis 连接（打开即用，无需手动添加）"
  - "如需连接其它 Redis，可在界面中手动添加：主机填 panel_redis、端口 6379"

resource_limits:
  memory_mb: 256
  cpus: 0.5
  mem_reserve_mb: 128

tabs:
  - id: performance
    label: 性能
    type: performance

proxy_spec:
  port_param: port
  ws_support: false
  description: "通过域名访问 RedisInsight，建议配置 HTTPS 保护管理界面"

# Web 访问控制：RedisInsight 自身无登录认证，强制只能面板代理访问
web_access:
  auth: none
  console_port_param: port

install_guide:
  description: "RedisInsight 已安装，可以通过浏览器管理 Redis："
  features:
    - "键值浏览 - 查看和编辑各种数据结构"
    - "命令执行 - 内置 CLI 执行 Redis 命令"
    - "性能监控 - 实时监控内存、连接、慢日志"
  primary_action:
    label: "打开 RedisInsight"
    route: "/apps"
