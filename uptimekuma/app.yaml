key: uptimekuma
name: Uptime Kuma
category: utility
description: 美观易用的自托管监控工具，监控网站、TCP、HTTP、数据库等可用性，支持多种告警通知
source: official
icon: icon.svg
versions:
  - display: "1"
    tag: "1"
    image: louislam/uptime-kuma
    architectures: [amd64, arm64]
    is_default: true
  - display: "2"
    tag: "2"
    image: louislam/uptime-kuma
    architectures: [amd64, arm64]
default_version: "1"
architectures: [amd64, arm64]
has_web_ui: true
health_check_timeout: 60

params:
  - key: port
    label: 访问端口
    type: number
    default: 3001
    required: true

# Uptime Kuma 容器以 root 运行，数据目录 0755 即可
volumes_init:
  - path: /www/server/uptimekuma/data
    mode: "0755"

manage: []

install_hints:
  - "通过浏览器访问 http://服务器IP:端口 进入监控面板"
  - "首次访问需设置管理员账号和密码"
  - "支持监控 HTTP(S)、TCP、Ping、DNS、数据库等，可配置邮件/钉钉/Telegram 等告警"

resource_limits:
  memory_mb: 512
  cpus: 0.5
  mem_reserve_mb: 128

tabs:
  - id: performance
    label: 性能
    type: performance

proxy_spec:
  port_param: port
  ws_support: true
  description: "通过域名访问 Uptime Kuma，建议配置 HTTPS 保护监控面板"

# Web 访问控制：Uptime Kuma 首次访问设置管理员账号密码（自带认证），可开启外部访问
web_access:
  auth: builtin
  console_port_param: port

install_guide:
  description: "Uptime Kuma 已安装，可以通过浏览器监控服务可用性："
  features:
    - "多协议监控 - HTTP、TCP、Ping、DNS、数据库等"
    - "实时告警 - 邮件、钉钉、Telegram、Webhook 等通知方式"
    - "状态页 - 对外公开服务运行状态"
  primary_action:
    label: "打开 Uptime Kuma"
    route: "/apps"
