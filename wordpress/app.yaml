key: wordpress
name: WordPress
category: cms
description: 全球最流行的内容管理系统，占全球网站的 43%，插件生态丰富
source: official
icon: icon.svg
versions:
  - "6.7"
  - "6.6"
  - "6.5"
default_version: "6.7"
app_type: cms
web_root: /www/wwwroot/wordpress
has_web_ui: true
health_check_timeout: 0

# 服务类型依赖
service_dependencies:
  - type: webserver
    label: Web 服务器（Nginx/OpenResty/Apache）
  - type: php
    label: PHP 运行环境

# 精确应用依赖
dependencies:
  - mysql

params:
  - key: db_name
    label: 数据库名
    type: text
    default: wordpress
    required: true
  - key: db_user
    label: 数据库用户名
    type: text
    default: wordpress
    required: true
  - key: db_password
    label: 数据库密码
    type: password
    default: ""
    required: true
    auto_generate: true
  - key: table_prefix
    label: 数据表前缀
    type: text
    default: wp_
    required: true

db_init:
  registry_type: mysql
  db_name_param: db_name
  db_user_param: db_user
  db_password_param: db_password

install_hints:
  - "访问 http://服务器IP 完成 WordPress 安装向导"
  - "在网站管理中绑定域名、配置 PHP、申请 SSL 证书"
  - "数据库已自动创建，安装向导中直接填写数据库信息即可"
