key: wordpress
name: WordPress
category: cms
description: 全球最流行的内容管理系统，占全球网站的 43%，插件生态丰富
source: official
icon: icon.svg
versions:
  - display: "6.7"
    tag: "6.7-php8.2-apache"
    image: wordpress
    architectures: [amd64, arm64]
    is_default: true
  - display: "6.6"
    tag: "6.6-php8.2-apache"
    image: wordpress
    architectures: [amd64, arm64]
  - display: "6.5"
    tag: "6.5-php8.2-apache"
    image: wordpress
    architectures: [amd64, arm64]
default_version: "6.7"
architectures: [amd64, arm64]
service_type: cms
has_web_ui: true
health_check_timeout: 60

dependencies:
  - mysql

params:
  - key: http_port
    label: HTTP 端口
    type: number
    default: 8090
    required: true
  - key: db_name
    label: 数据库名
    type: text
    default: wordpress
    required: true
  - key: db_user
    label: 数据库用户名
    type: text
    default: wordpress
    required: true
  - key: db_password
    label: 数据库密码
    type: password
    default: ""
    required: true
    auto_generate: true
  - key: table_prefix
    label: 数据表前缀
    type: text
    default: wp_
    required: true

compose_vars:
  - placeholder: "{{wp_db_host}}"
    source: registry_password
    registry_type: mysql
    template: "panel_mysql"
    empty_value: "panel_mysql"

db_init:
  registry_type: mysql
  db_name_param: db_name
  db_user_param: db_user
  db_password_param: db_password

manage:
  - key: PHP_MEMORY_LIMIT
    label: PHP 内存限制
    type: select
    options:
      - value: 128M
        label: 128M
      - value: 256M
        label: 256M（推荐）
      - value: 512M
        label: 512M
    restart_required: true
    file_path: /www/server/wordpress/.env
    ini_section: env

  - key: UPLOAD_MAX_FILESIZE
    label: 最大上传大小
    type: select
    options:
      - value: 64M
        label: 64M
      - value: 128M
        label: 128M
      - value: 256M
        label: 256M
    restart_required: true
    file_path: /www/server/wordpress/.env
    ini_section: env

install_hints:
  - "通过浏览器访问 http://服务器IP:端口 完成 WordPress 安装向导"
  - "数据库已自动创建，安装向导中直接填写数据库信息即可"
  - "如需通过域名访问，可在管理抽屉中创建反向代理网站"

resource_limits:
  memory_mb: 512
  cpus: 1.0
  mem_reserve_mb: 256

tabs:
  - id: performance
    label: 性能
    type: performance

proxy_spec:
  port_param: http_port
  ws_support: false
  description: "通过域名访问 WordPress，建议配置 HTTPS"

install_guide:
  description: "WordPress 已安装，可以通过浏览器访问完成初始化："
  features:
    - "可视化编辑 - 支持 Gutenberg 块编辑器"
    - "插件生态 - WordPress.org 上 5 万+插件"
    - "主题市场 - 数千个免费/付费主题"
  primary_action:
    label: "打开 WordPress"
    route: "/apps"
