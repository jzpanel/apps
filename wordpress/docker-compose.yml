services:
  wordpress:
    image: wordpress:{{tag}}
    container_name: panel_wordpress
    restart: unless-stopped
    ports:
      - "{{http_port}}:80"
    environment:
      WORDPRESS_DB_HOST: "{{wp_db_host}}:3306"
      WORDPRESS_DB_NAME: "{{db_name}}"
      WORDPRESS_DB_USER: "{{db_user}}"
      WORDPRESS_DB_PASSWORD: "{{db_password}}"
      WORDPRESS_TABLE_PREFIX: "{{table_prefix}}"
      PHP_MEMORY_LIMIT: 256M
      UPLOAD_MAX_FILESIZE: 128M
      POST_MAX_SIZE: 128M
    volumes:
      - /www/server/wordpress/html:/var/www/html
    networks:
      - panel_network
    deploy:
      resources:
        limits:
          memory: {{mem_limit}}
          cpus: "{{cpu_limit}}"
        reservations:
          memory: {{mem_reserve}}

networks:
  panel_network:
    external: true
    name: panel_network
